<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Professional Signal Bot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f111a; color: #ffffff; font-family: sans-serif; -webkit-user-select: none; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(10px); }
        .active-border { border: 2px solid #00d2ff !important; background: rgba(0, 210, 255, 0.1) !important; opacity: 1 !important; }
        option:disabled { color: #4a5568; background-color: #0f111a; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-5 flex flex-col min-h-screen max-w-md mx-auto">

    <div class="flex justify-between items-center mb-6">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 rounded-full border-2 border-cyan-400 flex items-center justify-center text-cyan-400 font-bold text-xs">◎</div>
            <h1 class="text-xs font-bold tracking-widest uppercase">SIGNAL PRO</h1>
        </div>
        <div id="marketStatus" class="text-[9px] px-2 py-1 rounded-full border"></div>
    </div>

    <div class="mb-5">
        <label class="text-[10px] text-gray-500 uppercase font-black mb-2 block tracking-widest">Выберите актив</label>
        <select id="pairSelect" class="w-full bg-[#1b1e2e] border border-gray-700 rounded-xl p-3 outline-none glass-panel text-sm transition-all">
            <optgroup label="OTC ПАРЫ (Доступны 24/7)" id="otcGroup">
                <option value="EUR/USD OTC">EUR/USD OTC</option>
                <option value="GBP/USD OTC">GBP/USD OTC</option>
                <option value="USD/JPY OTC">USD/JPY OTC</option>
            </optgroup>
            <optgroup label="БИРЖЕВЫЕ ПАРЫ (Пн-Пт)" id="marketGroup">
                <option value="EUR/USD">EUR/USD (Market)</option>
                <option value="GBP/USD">GBP/USD (Market)</option>
                <option value="USD/JPY">USD/JPY (Market)</option>
                <option value="AUD/CAD">AUD/CAD (Market)</option>
            </optgroup>
            <optgroup label="КРИПТОВАЛЮТЫ (24/7)">
                <option value="BTC/USDT">Bitcoin (BTC)</option>
                <option value="ETH/USDT">Ethereum (ETH)</option>
                <option value="SOL/USDT">Solana (SOL)</option>
            </optgroup>
            <optgroup label="АКЦИИ & СЫРЬЕ">
                <option value="GOLD">GOLD (Золото)</option>
                <option value="APPLE">APPLE (Stock)</option>
                <option value="TESLA">TESLA (Stock)</option>
            </optgroup>
        </select>
    </div>

    <div class="mb-6">
        <label class="text-[10px] text-gray-500 uppercase font-black mb-2 block tracking-widest">Экспирация</label>
        <div class="grid grid-cols-3 gap-2" id="timeGrid">
            <div onclick="selectTime(this, '5s')" class="time-btn glass-panel active-border p-2 rounded-xl text-center cursor-pointer">
                <div class="text-xs font-bold">5s</div>
            </div>
            <div onclick="selectTime(this, '1m')" class="time-btn glass-panel p-2 rounded-xl text-center cursor-pointer opacity-50">
                <div class="text-xs font-bold">1m</div>
            </div>
            <div onclick="selectTime(this, '5m')" class="time-btn glass-panel p-2 rounded-xl text-center cursor-pointer opacity-50">
                <div class="text-xs font-bold">5m</div>
            </div>
        </div>
    </div>

    <button onclick="generateSignal()" id="mainBtn" class="w-full bg-gradient-to-br from-cyan-600 to-blue-700 py-4 rounded-xl font-black text-sm shadow-xl active:scale-95 transition-all mb-6 uppercase tracking-widest">
        ⚡ Анализировать
    </button>

    <div id="resultBlock" class="glass-panel p-6 rounded-[2rem] text-center border-white/5 hidden">
        <p id="resPair" class="text-[10px] text-gray-500 mb-2 font-bold"></p>
        <p id="resDir" class="text-4xl font-black uppercase mb-5 tracking-tighter"></p>
        <div class="h-[1px] bg-white/10 w-full mb-4"></div>
        <p class="text-[10px] text-gray-400 uppercase mb-1">Точность прогноза</p>
        <p id="resConf" class="font-black text-xl italic text-cyan-400"></p>
    </div>

    <script>
        let selectedTime = '5s';

        // Проверка рынка (Выходные или нет)
        function checkMarketStatus() {
            const now = new Date();
            const day = now.getDay(); // 0 - воскресенье, 6 - суббота
            const statusLabel = document.getElementById('marketStatus');
            const marketOptions = document.querySelectorAll('#marketGroup option');
            
            const isWeekend = (day === 6 || day === 0);

            if (isWeekend) {
                statusLabel.innerText = "РЫНОК ЗАКРЫТ (WEEKEND)";
                statusLabel.classList.add('border-red-500', 'text-red-500');
                marketOptions.forEach(opt => {
                    opt.disabled = true;
                    opt.innerText += " 🔒";
                });
                document.getElementById('pairSelect').value = "EUR/USD OTC";
            } else {
                statusLabel.innerText = "РЫНОК ОТКРЫТ (LIVE)";
                statusLabel.classList.add('border-green-500', 'text-green-500');
            }
        }

        function selectTime(el, time) {
            document.querySelectorAll('.time-btn').forEach(btn => {
                btn.classList.remove('active-border');
                btn.classList.add('opacity-50');
            });
            el.classList.add('active-border');
            el.classList.remove('opacity-50');
            selectedTime = time;
        }

        function generateSignal() {
            const btn = document.getElementById('mainBtn');
            const result = document.getElementById('resultBlock');
            const pair = document.getElementById('pairSelect').value;
            
            btn.innerText = "СКАНИРОВАНИЕ...";
            btn.disabled = true;
            result.classList.add('hidden');

            setTimeout(() => {
                btn.innerText = "⚡ АНАЛИЗИРОВАТЬ";
                btn.disabled = false;
                
                const isUp = Math.random() > 0.5;
                const conf = Math.floor(Math.random() * (98 - 75 + 1)) + 75;

                document.getElementById('resPair').innerText = `${pair} [${selectedTime}]`;
                document.getElementById('resDir').innerText = isUp ? "ВВЕРХ ▲" : "ВНИЗ ▼";
                document.getElementById('resDir').className = `text-4xl font-black uppercase mb-5 tracking-tighter ${isUp ? 'text-green-500' : 'text-red-500'}`;
                document.getElementById('resConf').innerText = conf + "%";
                
                result.classList.remove('hidden');
                result.scrollIntoView({ behavior: 'smooth' });
            }, 1500);
        }

        // Запуск проверки при загрузке
        checkMarketStatus();
    </script>
</body>
</html>
