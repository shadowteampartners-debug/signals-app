<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SIGNAL PRO TERMINAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #0b0d13; color: #ffffff; font-family: 'Montserrat', sans-serif; -webkit-user-select: none; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
        .active-tab { border-color: #00d2ff; background: rgba(0, 210, 255, 0.1); color: #00d2ff; }
        @keyframes scan { 0% { top: 0%; } 50% { top: 100%; } 100% { top: 0%; } }
        .scan-line { position: absolute; width: 100%; height: 2px; background: #00d2ff; box-shadow: 0 0 15px #00d2ff; animation: scan 3s infinite linear; display: none; }
        .result-up { color: #00ff88; text-shadow: 0 0 20px rgba(0, 255, 136, 0.4); }
        .result-down { color: #ff3366; text-shadow: 0 0 20px rgba(255, 51, 102, 0.4); }
    </style>
</head>
<body class="p-5 flex flex-col h-screen overflow-hidden">

    <div class="flex items-center justify-between mb-8">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-blue-600 to-cyan-400 flex items-center justify-center font-black italic shadow-lg shadow-blue-500/20">S</div>
            <div>
                <h1 class="text-xs font-black tracking-widest uppercase">Signal Pro</h1>
                <p class="text-[8px] text-green-400 font-bold uppercase tracking-tighter animate-pulse">● AI Core Synchronized</p>
            </div>
        </div>
        <div class="text-right">
            <p class="text-[8px] text-gray-500 font-black uppercase">Market Status</p>
            <p class="text-[10px] font-bold text-white uppercase">Active 24/7</p>
        </div>
    </div>

    <div class="flex-grow space-y-5">
        
        <div class="space-y-2">
            <label class="text-[9px] font-black text-gray-500 uppercase tracking-widest ml-1">Выберите актив</label>
            <select id="asset" class="w-full glass rounded-2xl p-4 outline-none font-bold text-sm appearance-none cursor-pointer">
                <optgroup label="FOREX (REAL-TIME)">
                    <option value="EUR/USD">EUR/USD (Forex)</option>
                    <option value="GBP/USD">GBP/USD (Forex)</option>
                    <option value="USD/JPY">USD/JPY (Forex)</option>
                </optgroup>
                <optgroup label="CRYPTO (AI ANALYTICS)">
                    <option value="BITCOIN">BITCOIN (BTC)</option>
                    <option value="ETHEREUM">ETHEREUM (ETH)</option>
                    <option value="SOLANA">SOLANA (SOL)</option>
                </optgroup>
                <optgroup label="OTC ASSETS">
                    <option value="EUR/USD OTC">EUR/USD OTC</option>
                    <option value="GBP/USD OTC">GBP/USD OTC</option>
                </optgroup>
            </select>
        </div>

        <div class="space-y-2">
            <label class="text-[9px] font-black text-gray-500 uppercase tracking-widest ml-1">Экспирация</label>
            <div class="grid grid-cols-3 gap-3">
                <button onclick="setTime(this, '5s')" class="time-btn glass p-4 rounded-2xl font-black text-xs active-tab">5S</button>
                <button onclick="setTime(this, '1M')" class="time-btn glass p-4 rounded-2xl font-black text-xs opacity-50">1M</button>
                <button onclick="setTime(this, '5M')" class="time-btn glass p-4 rounded-2xl font-black text-xs opacity-50">5M</button>
            </div>
        </div>

        <div id="display" class="glass rounded-[2.5rem] p-8 relative overflow-hidden hidden">
            <div id="scanLine" class="scan-line"></div>
            <div class="text-center space-y-4">
                <p id="displayPair" class="text-[10px] text-gray-400 font-black tracking-widest uppercase"></p>
                <div id="signalText" class="text-5xl font-black italic tracking-tighter"></div>
                <div class="space-y-1">
                    <p class="text-[8px] text-gray-500 font-black uppercase">Проходимость</p>
                    <p id="accuracy" class="text-2xl font-black italic text-cyan-400"></p>
                </div>
            </div>
        </div>

    </div>

    <div class="mt-auto pt-4">
        <button id="mainBtn" onclick="runAnalysis()" class="w-full bg-gradient-to-r from-blue-700 to-cyan-500 py-6 rounded-3xl font-black text-xs tracking-[0.3em] uppercase shadow-xl shadow-blue-500/20 active:scale-95 transition-all">
            Анализ рынка
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        let selectedTime = '5s';

        function setTime(btn, time) {
            document.querySelectorAll('.time-btn').forEach(b => { b.classList.remove('active-tab'); b.classList.add('opacity-50'); });
            btn.classList.add('active-tab');
            btn.classList.remove('opacity-50');
            selectedTime = time;
        }

        function runAnalysis() {
            const btn = document.getElementById('mainBtn');
            const display = document.getElementById('display');
            const scanLine = document.getElementById('scanLine');
            const signalText = document.getElementById('signalText');

            btn.disabled = true;
            btn.innerHTML = "СКАНИРОВАНИЕ...";
            display.classList.remove('hidden');
            scanLine.style.display = 'block';
            signalText.innerHTML = "";
            document.getElementById('accuracy').innerText = "";

            setTimeout(() => {
                const isUp = Math.random() > 0.45;
                const acc = Math.floor(Math.random() * (97 - 86 + 1)) + 86;
                
                scanLine.style.display = 'none';
                document.getElementById('displayPair').innerText = document.getElementById('asset').value + " // " + selectedTime;
                
                signalText.innerHTML = isUp ? "ВВЕРХ ▲" : "ВНИЗ ▼";
                signalText.className = isUp ? "text-5xl font-black italic tracking-tighter result-up" : "text-5xl font-black italic tracking-tighter result-down";
                
                document.getElementById('accuracy').innerText = acc + "%";
                btn.innerHTML = "Анализ рынка";
                btn.disabled = false;

                if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            }, 2500);
        }
    </script>
</body>
</html>
