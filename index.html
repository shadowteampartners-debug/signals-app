<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Signal Bot App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f111a; color: #ffffff; font-family: sans-serif; -webkit-user-select: none; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(10px); }
        .active-border { border: 2px solid #00d2ff; background: rgba(0, 210, 255, 0.1); }
    </style>
</head>
<body class="p-5 flex flex-col min-h-screen">
    <div class="flex items-center gap-3 mb-8">
        <div class="w-10 h-10 rounded-full border-2 border-cyan-400 flex items-center justify-center text-cyan-400 font-bold">◎</div>
        <h1 class="text-lg font-bold tracking-widest uppercase text-gray-200">Торговые Сигналы</h1>
    </div>

    <div class="mb-6">
        <label class="text-[10px] text-gray-500 uppercase font-black mb-2 block tracking-widest">Валютная пара</label>
        <div class="glass-panel p-4 rounded-2xl flex justify-between items-center">
            <span class="font-medium">OTC EUR/USD</span>
            <span>▼</span>
        </div>
    </div>

    <div class="mb-8">
        <label class="text-[10px] text-gray-500 uppercase font-black mb-2 block tracking-widest">Время экспирации</label>
        <div class="grid grid-cols-3 gap-3">
            <div class="glass-panel active-border p-3 rounded-2xl text-center">
                <div class="text-sm font-bold">5s</div>
                <div class="text-[9px] text-cyan-400/70">5 seconds</div>
            </div>
            <div class="glass-panel p-3 rounded-2xl text-center opacity-40">
                <div class="text-sm font-bold">1m</div>
            </div>
            <div class="glass-panel p-3 rounded-2xl text-center opacity-40">
                <div class="text-sm font-bold">5m</div>
            </div>
        </div>
    </div>

    <button class="w-full bg-gradient-to-br from-cyan-500 to-blue-600 py-4 rounded-2xl font-black text-lg shadow-xl active:scale-95 transition-transform mb-8">
        ПОЛУЧИТЬ СИГНАЛ
    </button>

    <div class="glass-panel p-6 rounded-[2rem] text-center border-white/5">
        <p class="text-xs text-gray-500 mb-2">OTC EUR/USD 5s</p>
        <p class="text-4xl font-black text-green-400 uppercase mb-5">Покупать</p>
        <p class="text-[10px] text-gray-400 uppercase mb-1">Уровень уверенности</p>
        <p class="text-orange-400 font-black text-lg">Средний</p>
    </div>
</body>
</html>
